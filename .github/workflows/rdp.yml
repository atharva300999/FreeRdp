name: Free Windows RDP - Madara Fixed v2026

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user admin Madara@2026RDP! /add
          net localgroup administrators admin /add
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v AutoAdminLogon /t REG_SZ /d 1 /f

      - name: Download Latest Ngrok v3
        run: |
          Invoke-WebRequest -Uri https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath ngrok

      - name: Start Ngrok Tunnel
        run: |
          .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389" -NoNewWindow -PassThru

      - name: Keep RDP Alive & Print Info
        run: |
          Write-Host "========================================"
          Write-Host "RDP READY! Username: admin"
          Write-Host "Password: Madara@2026RDP!"
          Write-Host "Wait 1-2 min for Ngrok URL in logs..."
          Write-Host "========================================"
          while ($true) { Start-Sleep -Seconds 300 }
