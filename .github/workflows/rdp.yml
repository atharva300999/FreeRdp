name: Free RDP - Madara Cloudflare Style 2026

on: [workflow_dispatch]

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Enable RDP & Create User
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user MadaraRDP P@ssw0rd2026! /add
          net localgroup administrators MadaraRDP /add

      - name: Install Cloudflared
        run: |
          Invoke-WebRequest -Uri https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile cloudflared.exe

      - name: Start Cloudflare Tunnel for RDP
        run: |
          Start-Process .\cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389" -NoNewWindow -PassThru

      - name: Keep Alive & Show Credentials
        run: |
          Write-Host "========================================"
          Write-Host "✅ RDP READY!"
          Write-Host "Username: MadaraRDP"
          Write-Host "Password: P@ssw0rd2026!"
          Write-Host "Cloudflare Tunnel running... Check logs for tunnel URL"
          Write-Host "Use any RDP client with the tunnel address shown below"
          Write-Host "========================================"
          while ($true) { Start-Sleep -Seconds 300 }
